name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile
        run: >
          python -m py_compile
          main.py
          src/llm.py
          src/context/storage.py
          src/context/extractor.py
          src/context/manager.py
          src/context/wrapper.py
          src/context/build_prompt_little_director.py
          tests/test_context_memory.py

      - name: Test
        run: python -m unittest discover -s tests
